<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Creators Guardian: Seguridad operativa y blindaje digital para creadores de contenido, streamers y figuras públicas."
    />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#1a1a1a" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Creators Guardian" />
    <title>Creators Guardian | Blindaje para Creadores</title>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        if (params.get('view')) return;
        const mobileUA = /Android|iPhone|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const mobileScreen = window.matchMedia('(max-width: 820px) and (pointer: coarse)').matches;
        if (mobileUA || mobileScreen) {
          window.location.replace(`/mobile.html${window.location.search}${window.location.hash}`);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
