<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Creators Guardian: Seguridad operativa y blindaje digital para creadores de contenido."
    />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <title>Creators Guardian | Blindaje para Creadores</title>
    <style>
      body { background: #0a0a0a; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
      #loading-screen { text-align: center; }
      .spinner { border: 3px solid rgba(16, 185, 129, 0.1); border-top: 3px solid #10b981; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="loading-screen">
        <div class="spinner"></div>
        <p>Iniciando Creators Guardian...</p>
      </div>
    </div>
    
    <script>
      console.log('HTML Cargado. Esperando a main.jsx...');
      window.onerror = function(msg, url, line) {
        document.body.innerHTML = '<div style="padding:20px; color:red;"><h3>Error de Carga</h3><p>' + msg + '</p><small>' + url + ':' + line + '</small></div>';
        return false;
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
